<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcomWiki — Ecommerce Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#1B2742;--nvd:#111929;
  --nb:rgba(255,255,255,.08);--nh:rgba(255,255,255,.06);
  --bg:#F8F7F4;--bg2:#fff;--bg3:#F0EEE9;
  --bd:#E5E2DB;--bds:#CCC9C0;
  --tx:#1A1916;--tx2:#5C5A54;--tx3:#9C9A94;
  --ac:#4A7CF8;--ach:#3A6CE8;--acl:#EEF3FF;--acb:rgba(74,124,248,.3);
  --gn:#22A55A;--gnl:#E8F7EE;
  --am:#D97706;--aml:#FEF3C7;
  --rd:#DC2626;--rdl:#FEE2E2;
  --bl:#1D4ED8;--bll:#DBEAFE;
  --f:'Space Grotesk',sans-serif;--fm:'Space Mono',monospace;
  --r:6px;--rm:10px;--rl:14px;--rxl:20px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--f);font-size:14px;line-height:1.6;color:var(--tx);display:flex}

/* ── SIDEBAR ─────────────────────────────────────── */
.sb{width:232px;flex-shrink:0;background:var(--nv);display:flex;flex-direction:column;height:100vh}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--nb)}
.brand{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0}
.bsub{font-size:9px;color:rgba(255,255,255,.3);font-family:var(--fm);margin-top:3px;letter-spacing:.06em}
.nsec{padding:9px 15px 3px;font-size:9px;font-family:var(--fm);letter-spacing:.1em;color:rgba(255,255,255,.25);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;padding-right:12px}
.ni{margin:1px 8px;border-radius:var(--rm);padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .15s;background:transparent;border:none;width:calc(100% - 16px);text-align:left;font-family:var(--f)}
.ni:hover{background:var(--nh);color:#fff}
.ni.act{background:var(--ac);color:#fff}
.ni-ic{font-size:14px;width:17px;text-align:center;flex-shrink:0;opacity:.85}
.sdiv{height:1px;background:var(--nb);margin:5px 14px}
.sw{padding:7px 9px 3px}
.si{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:5px 9px;font-size:12px;font-family:var(--f);color:#fff;outline:none}
.si::placeholder{color:rgba(255,255,255,.2)}
.si:focus{border-color:rgba(74,124,248,.5)}
.sfl{padding:3px 9px 5px;display:flex;flex-wrap:wrap;gap:3px}
.fc{padding:2px 6px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.3);background:transparent;cursor:pointer;transition:all .15s}
.fc:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3)}
.fc.act{background:rgba(74,124,248,.25);border-color:rgba(74,124,248,.5);color:rgba(255,255,255,.9)}
.el{flex:1;overflow-y:auto;padding:0 0 4px}
.el::-webkit-scrollbar{width:3px}
.el::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.ei{margin:1px 8px;border-radius:var(--r);padding:7px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s;border:1px solid transparent}
.ei:hover{background:var(--nh)}
.ei.act{background:rgba(74,124,248,.18);border-color:rgba(74,124,248,.3)}
.ei.act .en{color:#fff}
.en{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esys{font-size:9px;font-family:var(--fm);color:rgba(255,255,255,.2);flex-shrink:0}
.edel{width:15px;height:15px;border-radius:3px;border:none;background:transparent;color:rgba(255,255,255,.15);cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;flex-shrink:0}
.ei:hover .edel{display:flex}
.edel:hover{color:#fca5a5}
.sempty{padding:14px;font-size:11px;color:rgba(255,255,255,.2);font-family:var(--fm);text-align:center}
.lr{padding:5px 9px;display:flex;gap:3px;border-top:1px solid var(--nb)}
.lb{flex:1;height:25px;border-radius:var(--r);border:1px solid rgba(255,255,255,.08);background:transparent;font-size:10px;font-family:var(--fm);font-weight:700;color:rgba(255,255,255,.3);cursor:pointer;transition:all .15s}
.lb:hover{color:#fff}
.lb.act{background:var(--ac);color:#fff;border-color:var(--ac)}
.sf{padding:8px 12px;border-top:1px solid var(--nb);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sfc{font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.25)}
.sfc span{color:rgba(255,255,255,.55);font-weight:700}
.sfb-row{display:flex;gap:3px}
.sfb{width:23px;height:23px;border-radius:var(--r);border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer;color:rgba(255,255,255,.3);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sfb:hover{background:var(--nh);color:#fff}

/* ── MAIN ─────────────────────────────────────────── */
.main{flex:1;height:100vh;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px}
.panel{display:none;flex:1}
.panel.act{display:flex;flex-direction:column}

/* ── OVERVIEW ─────────────────────────────────────── */
.ov{padding:38px 48px;max-width:900px}
.ov-t{font-size:26px;font-weight:700;color:var(--tx);letter-spacing:-.025em;margin-bottom:6px}
.ov-s{font-size:13px;color:var(--tx2);line-height:1.65;max-width:520px;margin-bottom:26px}
.sec-lbl{font-size:10px;font-family:var(--fm);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:11px}
.fw-g{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:26px}
.fw-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:15px}
.fw-n{font-size:10px;font-family:var(--fm);color:var(--tx3);margin-bottom:4px}
.fw-t{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:8px}
.fw-tags{display:flex;flex-wrap:wrap;gap:3px}
.fw-tag{font-size:10px;font-family:var(--fm);padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.mk-g{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:26px}
.mk-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:12px}
.mk-fl{font-size:19px;margin-bottom:4px}
.mk-nm{font-size:12px;font-weight:600;margin-bottom:2px}
.mk-d{font-size:10px;color:var(--tx3);line-height:1.4}
.ht-c{background:var(--nv);border-radius:var(--rxl);padding:20px 24px}
.ht-t{font-size:13px;font-weight:600;color:#fff;margin-bottom:12px}
.hs{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.hs:last-child{margin-bottom:0}
.hs-n{width:20px;height:20px;border-radius:50%;background:var(--ac);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.hs-t{font-size:12px;color:rgba(255,255,255,.68);line-height:1.55}

/* ── ASK ──────────────────────────────────────────── */
.ask-w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.ask-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rxl);padding:36px;max-width:540px;width:100%;text-align:center;box-shadow:var(--sh)}
.ask-ic{width:48px;height:48px;border-radius:var(--rl);background:var(--ac);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:20px;color:#fff;font-weight:700;box-shadow:0 4px 14px rgba(74,124,248,.3)}
.ask-t{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.ask-s{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:20px}
.ask-row{display:flex;gap:7px;margin-bottom:11px}
.ask-in{flex:1;height:44px;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--rm);padding:0 13px;font-size:14px;font-family:var(--f);color:var(--tx);outline:none;transition:border-color .15s}
.ask-in:focus{border-color:var(--ac);background:var(--bg2)}
.ask-in::placeholder{color:var(--tx3)}
.ask-btn{height:44px;padding:0 18px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.ask-btn:hover:not(:disabled){background:var(--ach)}
.ask-btn:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed}
.ask-exs{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.ask-ex{padding:3px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--bg3);font-size:11px;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:var(--fm)}
.ask-ex:hover{border-color:var(--ac);color:var(--ac)}

/* API mode toggle */
.mode-bar{display:flex;gap:0;border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;margin-bottom:16px}
.mode-btn{flex:1;height:36px;border:none;background:transparent;font-size:12px;font-family:var(--f);font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s;border-right:1px solid var(--bd)}
.mode-btn:last-child{border-right:none}
.mode-btn.act{background:var(--ac);color:#fff}
.mode-btn:hover:not(.act){background:var(--bg3)}

/* Manual paste panel */
.paste-wrap{display:none;flex-direction:column;gap:12px;text-align:left}
.paste-wrap.show{display:flex}
.prompt-box{background:var(--nv);border-radius:var(--rm);padding:14px 16px;position:relative}
.prompt-lbl{font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.copy-btn{height:22px;padding:0 9px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s}
.copy-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.prompt-text{font-family:var(--fm);font-size:11px;color:#93C5FD;line-height:1.6;max-height:140px;overflow-y:auto}
.paste-ta{width:100%;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--rm);padding:10px 13px;font-size:12px;font-family:var(--fm);color:var(--tx);outline:none;resize:vertical;min-height:96px;line-height:1.55}
.paste-ta:focus{border-color:var(--ac)}
.paste-ta::placeholder{color:var(--tx3)}
.paste-submit{width:100%;height:42px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.paste-submit:hover{background:var(--ach)}

/* API key setup */
.apikey-banner{background:var(--aml);border:1px solid rgba(217,119,6,.25);border-radius:var(--rm);padding:11px 14px;margin-top:12px;font-size:12px;color:#92400E;display:none}
.apikey-banner.show{display:flex;gap:10px;align-items:flex-start}
.apikey-banner a{color:var(--am);font-weight:600}
.apikey-setup-link{font-size:11px;color:var(--ac);cursor:pointer;text-decoration:underline;margin-top:6px;display:inline-block}

/* Loading */
.load-w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:40px}
.lspin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:13px;font-weight:600;color:var(--tx)}
.ls{font-size:11px;font-family:var(--fm);color:var(--ac)}
.lbar{width:200px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden}
.lbf{height:100%;background:var(--ac);border-radius:1px;animation:lba 1.8s ease-in-out infinite}
@keyframes lba{0%{width:0;margin-left:0}50%{width:70%;margin-left:0}100%{width:10%;margin-left:90%}}

/* ── SETTINGS PANEL ───────────────────────────────── */
.settings-w{padding:38px 48px;max-width:680px}
.settings-t{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.02em;margin-bottom:5px}
.settings-s{font-size:13px;color:var(--tx2);margin-bottom:28px}
.settings-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:20px 24px;margin-bottom:16px}
.settings-card-t{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px}
.settings-card-s{font-size:12px;color:var(--tx2);margin-bottom:14px;line-height:1.55}
.settings-row{display:flex;gap:8px;align-items:center}
.settings-in{flex:1;height:40px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);padding:0 12px;font-size:13px;font-family:var(--fm);color:var(--tx);outline:none}
.settings-in:focus{border-color:var(--ac)}
.settings-in::placeholder{color:var(--tx3)}
.settings-save-btn{height:40px;padding:0 16px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.settings-save-btn:hover{background:var(--ach)}
.settings-clr-btn{height:40px;padding:0 14px;background:transparent;color:var(--rd);border:1px solid rgba(220,38,38,.25);border-radius:var(--rm);font-family:var(--f);font-size:13px;cursor:pointer;transition:all .15s}
.settings-clr-btn:hover{background:var(--rdl)}
.key-status{margin-top:10px;font-size:12px;font-family:var(--fm);display:none}
.key-ok{color:var(--gn)}
.key-none{color:var(--tx3)}
.provider-tabs{display:flex;gap:0;border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;margin-bottom:14px;width:fit-content}
.ptab{height:32px;padding:0 14px;border:none;background:transparent;font-size:12px;font-family:var(--f);font-weight:500;color:var(--tx2);cursor:pointer;border-right:1px solid var(--bd)}
.ptab:last-child{border-right:none}
.ptab.act{background:var(--nv);color:#fff}
.provider-info{font-size:11px;color:var(--tx3);line-height:1.55;margin-bottom:12px}
.provider-info a{color:var(--ac)}

/* ── ENTRY ────────────────────────────────────────── */
.ep{flex:1;display:flex;flex-direction:column;min-height:0}
.eh{background:var(--bg2);border-bottom:1px solid var(--bd);padding:18px 36px 15px;flex-shrink:0}
.ebc{font-size:10px;font-family:var(--fm);color:var(--tx3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ebc-s{color:var(--bds)}
.eh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.e-title{font-size:22px;font-weight:700;letter-spacing:-.025em;color:var(--tx);line-height:1.15}
.e-sub{font-size:12px;color:var(--tx2);margin-top:3px}
.e-chips{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.echip{font-size:10px;font-family:var(--fm);padding:2px 8px;border-radius:4px;font-weight:700}
.ec-sys{background:var(--acl);color:var(--bl);border:1px solid var(--acb)}
.ec-stg{background:var(--aml);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.eh-act{display:flex;gap:5px;flex-shrink:0;margin-top:2px}
.eh-btn{height:28px;padding:0 11px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg3);font-size:10px;font-family:var(--fm);font-weight:700;color:var(--tx2);cursor:pointer;transition:all .15s}
.eh-btn:hover{background:var(--bd);color:var(--tx)}
.ebody{flex:1;overflow-y:auto;padding:22px 36px 42px;max-width:820px}
.ebody::-webkit-scrollbar{width:4px}
.ebody::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px}
.sec{margin-bottom:24px}
.slbl{font-size:10px;font-family:var(--fm);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:8px}
.stxt{font-size:13px;color:var(--tx2);line-height:1.78}
.formula{font-family:var(--fm);font-size:12px;background:var(--nv);color:#93C5FD;border-radius:var(--rm);padding:11px 15px;line-height:1.9;border-left:3px solid var(--ac)}
.who-l{display:flex;flex-wrap:wrap;gap:5px}
.who-p{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--bd);color:var(--tx2);background:var(--bg2)}
.mkg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.mdc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:13px}
.mdc:hover{border-color:var(--acb)}
.mdc-h{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:6px;display:flex;align-items:baseline;gap:5px}
.mdc-tm{font-size:10px;font-family:var(--fm);color:var(--tx3);font-weight:400}
.mdc-b{font-size:12px;color:var(--tx2);line-height:1.65}
.mdc-b li{list-style:none;padding-left:10px;position:relative;margin-bottom:2px}
.mdc-b li::before{content:"–";position:absolute;left:0;color:var(--tx3)}
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{text-align:left;font-family:var(--fm);font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:5px 9px;border-bottom:1.5px solid var(--bd)}
.dtbl td{padding:8px 9px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:top;line-height:1.45}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:var(--bg3)}
.dbg{font-size:10px;font-family:var(--fm);padding:2px 7px;border-radius:4px;white-space:nowrap;display:inline-block;font-weight:700}
.dg{background:var(--gnl);color:var(--gn);border:1px solid rgba(34,165,90,.2)}
.da{background:var(--aml);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.dr{background:var(--rdl);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.db{background:var(--bll);color:var(--bl);border:1px solid rgba(29,78,216,.2)}
.rc-c{background:var(--nv);border-radius:var(--rl);padding:13px 16px;display:flex;flex-direction:column;gap:5px}
.rc-lbl{font-size:10px;font-family:var(--fm);font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.08em}
.rc-t{font-size:13px;font-weight:600;color:#fff}
.rc-d{font-size:12px;color:rgba(255,255,255,.6);line-height:1.6}
.rc-u{font-size:11px;font-family:var(--fm);color:#93C5FD;text-decoration:none;word-break:break-all}
.rc-u:hover{text-decoration:underline}
.cmts-w{margin-top:30px;padding-top:22px;border-top:1px solid var(--bd)}
.cmts-hd{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.cmts-t{font-size:10px;font-family:var(--fm);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3)}
.cmt-cnt{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);padding:1px 7px;border-radius:20px;font-size:10px;font-family:var(--fm)}
.cmt-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 15px;margin-bottom:9px;border-left:3px solid var(--ac)}
.cmt-q{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:7px;display:flex;gap:8px;align-items:flex-start}
.cmt-ql{font-family:var(--fm);font-size:9px;font-weight:700;color:var(--ac);background:var(--acl);padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.cmt-a{font-size:13px;color:var(--tx2);line-height:1.72;padding-left:27px}
.cmt-dt{font-size:10px;font-family:var(--fm);color:var(--tx3);padding-left:27px;margin-top:5px}
.no-cmt{font-size:12px;color:var(--tx3);font-family:var(--fm);padding:7px 0}
/* ── MODAL / CTX ──────────────────────────────────── */
.ctx{position:fixed;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:500;overflow:hidden;min-width:148px;display:none}
.ctx.open{display:block}
.ctx-i{padding:9px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--tx)}
.ctx-i:hover{background:var(--bg3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:800;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.md{background:var(--bg2);border-radius:var(--rxl);box-shadow:0 20px 60px rgba(0,0,0,.2);width:500px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--bd)}
.md-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.md-t{font-size:14px;font-weight:700}
.md-x{width:26px;height:26px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg3);cursor:pointer;font-size:15px;color:var(--tx2);display:flex;align-items:center;justify-content:center}
.md-b{padding:15px 20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.md-cl{font-size:10px;font-family:var(--fm);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px}
.md-ctx{font-size:12px;color:var(--tx2);background:var(--bg3);border-radius:var(--r);padding:8px 11px;line-height:1.5;border-left:2px solid var(--bds);font-style:italic;max-height:80px;overflow:hidden}
.md-ta{width:100%;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--rm);padding:9px 12px;font-size:13px;font-family:var(--f);color:var(--tx);outline:none;resize:vertical;min-height:80px;line-height:1.6}
.md-ta:focus{border-color:var(--ac)}
.md-ta::placeholder{color:var(--tx3)}

/* Paste modal for followup */
.fu-prompt-box{background:var(--nv);border-radius:var(--rm);padding:12px 14px;position:relative;margin-bottom:4px}
.fu-prompt-lbl{font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.fu-prompt-txt{font-family:var(--fm);font-size:11px;color:#93C5FD;line-height:1.55;max-height:80px;overflow-y:auto}

.md-f{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end}
.btn-s{height:32px;padding:0 14px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;font-size:12px;font-family:var(--f);font-weight:600;color:var(--tx2);cursor:pointer}
.btn-p{height:32px;padding:0 16px;border-radius:var(--r);border:none;background:var(--ac);font-size:12px;font-family:var(--f);font-weight:700;color:#fff;cursor:pointer}
.btn-p:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed}
.empty-w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px;text-align:center}
.empty-ic{font-size:30px;opacity:.15}
.empty-t{font-size:15px;font-weight:600;color:var(--tx2)}
.empty-s{font-size:13px;color:var(--tx3);max-width:220px;line-height:1.5}
.toast{position:fixed;bottom:18px;right:18px;background:var(--nv);color:#fff;padding:9px 14px;border-radius:var(--rm);font-size:13px;z-index:999;transform:translateY(48px);opacity:0;transition:all .3s;pointer-events:none;max-width:280px;border-left:3px solid var(--ac)}
.toast.show{transform:translateY(0);opacity:1}

/* ─── EMPTY STATE (zero entries) ─── */
.entry-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;padding:40px;text-align:center;gap:12px}
.ees-icon{font-size:40px;opacity:.2;margin-bottom:4px}
.ees-title{font-size:16px;font-weight:600;color:var(--tx2);letter-spacing:-.01em}
.ees-sub{font-size:13px;color:var(--tx3);max-width:260px;line-height:1.6}
.ees-cta{margin-top:8px;height:38px;padding:0 20px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.ees-cta:hover{background:var(--ach)}

/* ─── Enterprise browser mode ─── */
.ent-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rm);font-size:12px;margin-top:10px}
.ent-status.checking{background:var(--bg3);color:var(--tx3)}
.ent-status.ready{background:var(--gnl);color:var(--gn);border:1px solid rgba(34,165,90,.2)}
.ent-status.needs-login{background:var(--aml);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.ent-status.error{background:var(--rdl);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.ent-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ent-status.checking .ent-status-dot{background:var(--tx3);animation:pulse 1.2s ease-in-out infinite}
.ent-status.ready .ent-status-dot{background:var(--gn)}
.ent-status.needs-login .ent-status-dot{background:var(--am)}
.ent-status.error .ent-status-dot{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ent-login-btn{margin-top:8px;width:100%;height:38px;background:var(--nv);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.ent-login-btn:hover{background:#253352}
.ent-progress{margin-top:10px;font-size:11px;font-family:var(--fm);color:var(--ac);display:none}
.ent-progress.show{display:block}
.ent-progress-bar{height:2px;background:var(--bd);border-radius:1px;overflow:hidden;margin-top:4px}
.ent-progress-fill{height:100%;background:var(--ac);border-radius:1px;transition:width .4s ease;width:0%}

/* ── Clipboard import button ─────────────────────────── */
.clip-btn{width:100%;height:44px;background:var(--nv);color:#fff;border:none;border-radius:var(--rm);font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.clip-btn:hover{background:#253352}
.clip-btn.success{background:var(--gn)!important}
.clip-btn.error{background:var(--rd)!important}
.clip-divider{display:flex;align-items:center;gap:10px;margin:14px 0 6px;color:var(--tx3);font-size:11px;font-family:var(--fm)}
.clip-divider::before,.clip-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
</style>
</head>
<body>

<div class="sb">

  </div>

  <div class="sw"><input class="si" id="s-inp" placeholder="搜索词条..." oninput="renderL()"></div>
  <div class="sfl">
    <button class="fc act" onclick="setF('all')" data-v="all" id="fc-all">全部</button>
    <button class="fc" onclick="setF('CMS')" data-v="CMS">CMS</button>
    <button class="fc" onclick="setF('BI')" data-v="BI">BI</button>

  </div>

      <button class="sfb" onclick="expJSON()" title="Export JSON">↓</button>

</div>

<div class="main">

  <!-- OVERVIEW -->
  <div class="panel act" id="panel-overview">
    <div class="ov">

      <div class="ov-s" id="ov-s"></div>

      <div class="fw-g" id="fw-g"></div>

        <div class="ask-s" id="ask-s"></div>

<script>

function sv(){localStorage.setItem('ewk5',JSON.stringify({entries:G.entries,lang:G.lang,provider:G.provider,askMode:G.askMode}));}
function lv(){
  var r=localStorage.getItem('ewk5');
  if(r){try{var d=JSON.parse(r);
    if(d.entries)G.entries=d.entries;
    if(d.lang)G.lang=d.lang;
    // Sanitize legacy provider values (openai/deepseek no longer supported)
    if(d.provider&&['anthropic','openrouter','n8n','enterprise'].indexOf(d.provider)>-1)G.provider=d.provider;
    if(d.askMode)G.askMode=d.askMode;
  }catch(e){}}
}

var PROVIDERS={
  anthropic:{
    name:'Anthropic (Claude Sonnet)',
    keyPrefix:'sk-ant-',
    infoZh:'获取 Key：<a href="https://console.anthropic.com/account/keys" target="_blank">console.anthropic.com</a><br>Anthropic 原生支持浏览器直连，无需任何代理。建议充值 $5 起步。',
    infoEn:'Get Key: <a href="https://console.anthropic.com/account/keys" target="_blank">console.anthropic.com</a><br>Anthropic natively supports direct browser calls. Recommended starting credit: $5.',
    call:async function(prompt,sys,key){
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-5',
          max_tokens:2000,
          system:sys,
          messages:[{role:'user',content:prompt}]
        })
      });
      if(!res.ok){
        var e=await res.text();
        var msg='';
        try{var j=JSON.parse(e);msg=j.error&&j.error.message?j.error.message:e.slice(0,200);}catch(x){msg=e.slice(0,200);}
        throw new Error('Anthropic '+res.status+': '+msg);
      }
      var d=await res.json();
      if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
      return d.content&&d.content[0]?d.content[0].text:'';
    }
  },
  openrouter:{
    name:'OpenRouter (Claude / GPT-4o / Gemini / DeepSeek)',
    keyPrefix:'sk-or-',
    infoZh:'获取 Key：<a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a><br>OpenRouter 专为浏览器端设计，明确支持 CORS。免费额度每天可用，一个 Key 可调用所有主流模型（Claude、GPT-4o、Gemini、DeepSeek 等）。强烈推荐没有 Anthropic Key 的用户使用。',
    infoEn:'Get Key: <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a><br>OpenRouter is purpose-built for browser use with explicit CORS support. Daily free tier available. One key covers all major models (Claude, GPT-4o, Gemini, DeepSeek, etc.). Highly recommended if you don\'t have an Anthropic key.',
    call:async function(prompt,sys,key){

        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer '+key,
          'HTTP-Referer':'https://ecomwiki.app',

        body:JSON.stringify({
          model:'anthropic/claude-sonnet-4-5',

          messages:[
            {role:'system',content:sys},
            {role:'user',content:prompt}
          ]
        })
      });
      if(!res.ok){
        var e=await res.text();
        var msg='';
        try{var j=JSON.parse(e);msg=j.error&&j.error.message?j.error.message:e.slice(0,200);}catch(x){msg=e.slice(0,200);}
        throw new Error('OpenRouter '+res.status+': '+msg);
      }
      var d=await res.json();
      if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
      return d.choices&&d.choices[0]?d.choices[0].message.content:'';
    }
  },
  n8n:{
    name:'n8n Webhook',
    keyPrefix:'https://',
    infoZh:'粘贴你的 n8n Webhook URL。n8n 作为服务端代理调用 AI，完全绕过浏览器 CORS 限制。你的 API Key 安全地存储在 n8n 服务器上，不暴露在浏览器中。<br><a href="https://n8n.io" target="_blank">→ 注册免费 n8n Cloud</a>',
    infoEn:'Paste your n8n Webhook URL. n8n acts as a server-side proxy — fully bypasses browser CORS. Your API key stays on the n8n server, never exposed in the browser.<br><a href="https://n8n.io" target="_blank">→ Get free n8n Cloud</a>',
    call:async function(prompt,sys,key){
      if(!key||!key.startsWith('http'))throw new Error('INVALID_N8N_URL');
      var res=await fetch(key,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({term:prompt,system_prompt:sys})
      });
      if(!res.ok){var e=await res.text();throw new Error('n8n '+res.status+': '+e.slice(0,120));}
      return await res.text();
    }
  }
};

async function callAPI(prompt,sysPrompt){
  var key=getKey();
  if(!key)throw new Error('NO_KEY');
  var p=PROVIDERS[G.provider]||PROVIDERS.anthropic;
  return p.call(prompt,sysPrompt||SCHEMA_INSTR,key);
}

function checkKeyBanner(){
  var banner=document.getElementById('apikey-banner');
  // Enterprise mode: no key needed, check login status instead
  if(G.provider==='enterprise'){banner.classList.remove('show');return;}

function parseStructuredText(raw) {
  // Parse the ## section format from AI response
  function extractSection(text, tag) {
    var re = new RegExp('##' + tag + '##\\s*([\\s\\S]*?)(?=##[A-Z_]+##|$)');
    var m = text.match(re);
    return m ? m[1].trim() : '';
  }
  function extractLines(text, tag) {
    var block = extractSection(text, tag);
    return block.split('\n').map(function(l){return l.trim();}).filter(function(l){return l && l !== '无';});
  }
  function parseMarket(text, tag) {
    var lines = extractLines(text, tag);
    if (!lines.length) return null;
    return { term: lines[0] || '', points: lines.slice(1, 6) };
  }
  function parseData(text) {
    var block = extractSection(text, 'DATA');
    return block.split('\n').map(function(l){
      var parts = l.split('|').map(function(p){return p.trim();});
      if (parts.length < 2) return null;
      return { label: parts[0], val: parts[1], badge: parts[2]||'blue', note: parts[3]||'' };
    }).filter(Boolean);
  }

  var name = extractSection(raw, 'NAME');
  if (!name) return null; // Not our format

  var cnRaw = parseMarket(raw, 'CN');
  var krRaw = parseMarket(raw, 'KR');
  var jpRaw = parseMarket(raw, 'JP');
  var usRaw = parseMarket(raw, 'US');

  // concept: replace blank lines with \n\n
  var conceptRaw = extractSection(raw, 'CONCEPT');
  var concept = conceptRaw.replace(/\n\s*\n/g, '\n\n').replace(/\n/g, '\n');

  var formulaRaw = extractLines(raw, 'FORMULA');
  var formula = formulaRaw.length ? formulaRaw.join('\n') : null;

  return {
    name: name,
    subtitle: extractSection(raw, 'SUBTITLE'),
    system: extractSection(raw, 'SYSTEM').replace(/[^A-Za-z\u4e00-\u9fff]/g,''),
    stages: extractSection(raw, 'STAGES').split('|').map(function(s){return s.trim();}).filter(Boolean),
    concept: concept,
    formula: formula,
    who: extractSection(raw, 'WHO').split('|').map(function(s){return s.trim();}).filter(Boolean),
    markets: [
      cnRaw ? {flag:'\ud83c\udde8\ud83c\uddf3', name:'中国', term: cnRaw.term, points: cnRaw.points} : null,
      krRaw ? {flag:'\ud83c\uddf0\ud83c\uddf7', name:'韩国', term: krRaw.term, points: krRaw.points} : null,
      jpRaw ? {flag:'\ud83c\uddef\ud83c\uddf5', name:'日本', term: jpRaw.term, points: jpRaw.points} : null,
      usRaw ? {flag:'\ud83c\uddfa\ud83c\uddf8', name:'北美 Amazon', term: usRaw.term, points: usRaw.points} : null,
    ].filter(Boolean),
    data: parseData(raw),
    realCase: {
      title: extractSection(raw, 'CASE_TITLE'),
      desc: extractSection(raw, 'CASE_DESC'),
      url: extractSection(raw, 'CASE_URL')
    },
    comments: []
  };
}

function sanitizeJSON(raw) {
  // Step 1: Strip markdown fences
  var s=raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();
  // Step 2: Extract outermost JSON object
  var start=s.indexOf('{');
  var end=s.lastIndexOf('}');
  if(start>0&&end>start)s=s.slice(start,end+1);
  // Step 3: Fix literal newlines INSIDE string values (most common AI mistake)
  // Replace real newline chars inside quoted strings with \n escape
  var result='';
  var inString=false;
  var escape=false;
  for(var i=0;i<s.length;i++){
    var ch=s[i];
    if(escape){result+=ch;escape=false;continue;}
    if(ch==='\\'){result+=ch;escape=true;continue;}
    if(ch==='"'){inString=!inString;result+=ch;continue;}
    if(inString){
      if(ch==='\n'){result+='\\n';continue;}
      if(ch==='\r'){result+='\\r';continue;}
      if(ch==='\t'){result+='\\t';continue;}
    }
    result+=ch;
  }
  // Step 4: Fix trailing commas before ] or }
  result=result.replace(/,\s*([}\]])/g,'$1');
  return result;
}

function parseAndSave(raw,isManual){
  clearInterval(_st);
  if(!raw||!raw.trim()){
    toast(t('toast.err')+': empty response');
    if(!isManual){document.getElementById('ask-load').style.display='none';document.getElementById('ask-idle').style.display='flex';document.getElementById('ask-btn').disabled=false;}
    return null;
  }
  // Try structured text format first (paste mode from AI)
  var structured = parseStructuredText(raw);
  if (structured && structured.name) {
    structured.id = 'e_' + Date.now();
    structured.createdAt = new Date().toISOString().slice(0,10);
    G.entries.unshift(structured); sv();
    if (!isManual) {
      document.getElementById('ask-load').style.display='none';
      document.getElementById('ask-idle').style.display='flex';
      document.getElementById('ask-in').value='';
      document.getElementById('ask-btn').disabled=false;
    }
    renderL(); showE(structured.id); toast(t('toast.ok'));
    return structured;
  }

  // Fall back to JSON parsing (API mode)
  try{
    var clean=sanitizeJSON(raw);
    var entry=JSON.parse(clean);
    entry.id='e_'+Date.now();
    entry.createdAt=new Date().toISOString().slice(0,10);
    if(!entry.comments)entry.comments=[];
    G.entries.unshift(entry);sv();
    if(!isManual){document.getElementById('ask-load').style.display='none';document.getElementById('ask-idle').style.display='flex';document.getElementById('ask-in').value='';document.getElementById('ask-btn').disabled=false;}
    renderL();showE(entry.id);toast(t('toast.ok'));
    return entry;
  }catch(err){
    // Last resort: try JSON5-style relaxed parse by extracting fields manually
    var fallback=tryFallbackParse(raw);
    if(fallback){
      fallback.id='e_'+Date.now();
      fallback.createdAt=new Date().toISOString().slice(0,10);
      if(!fallback.comments)fallback.comments=[];
      G.entries.unshift(fallback);sv();
      if(!isManual){document.getElementById('ask-load').style.display='none';document.getElementById('ask-idle').style.display='flex';document.getElementById('ask-in').value='';document.getElementById('ask-btn').disabled=false;}
      renderL();showE(fallback.id);toast(t('toast.ok'));
      return fallback;
    }
    if(!isManual){document.getElementById('ask-load').style.display='none';document.getElementById('ask-idle').style.display='flex';document.getElementById('ask-btn').disabled=false;}
    toast(t('toast.err')+': JSON parse failed — '+err.message.slice(0,50));
    console.error('Parse error:',err,'\nRaw:',raw.slice(0,300));
    return null;
  }
}

function tryFallbackParse(raw){
  // Attempt to extract a partial entry when JSON is malformed
  // Extract key fields with regex as last resort
  try{
    var name=raw.match(/"name"\s*:\s*"([^"]+)"/);
    var subtitle=raw.match(/"subtitle"\s*:\s*"([^"]+)"/);
    var system=raw.match(/"system"\s*:\s*"([^"]+)"/);
    if(!name)return null;
    // Re-sanitize more aggressively: replace all control chars
    var clean=raw.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,'');
    // Replace unescaped newlines in string values more aggressively
    clean=clean.replace(/"([^"]*?)"/g,function(match,val){
      return '"'+val.replace(/\n/g,'\\n').replace(/\r/g,'').replace(/\t/g,' ')+'"';
    });
    // Remove trailing commas
    clean=clean.replace(/,\s*([}\]])/g,'$1');
    var start=clean.indexOf('{');var end=clean.lastIndexOf('}');
    if(start>=0&&end>start)clean=clean.slice(start,end+1);
    return JSON.parse(clean);
  }catch(e2){
    return null;
  }
}

  var entry=G.entries.find(function(e){return e.id===G.eid;});if(!entry){closeMO();return;}
  var sb=document.getElementById('md-sub');sb.disabled=true;sb.textContent='...';
  if(G.mmode==='fu'){
    var hasKey=!!getKey();
    if(hasKey){
      var q=(document.getElementById('md-ta').value||'').trim();if(!q){sb.disabled=false;sb.textContent=t('md.fu.sub');return;}
      try{
        var ans=await callAPI(buildFUPrompt(entry.name,G.sel,q),'You are an expert ecommerce knowledge assistant. Answer follow-up questions concisely in Chinese (2-3 paragraphs). Be specific and practical.');
        entry.comments=entry.comments||[];entry.comments.push({q:q,a:ans,date:new Date().toISOString().slice(0,10)});
        sv();closeMO();showE(entry.id);
        setTimeout(function(){var el=document.getElementById('cmts_'+entry.id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},300);
        toast(t('toast.fu'));
      }catch(err){toast(t('toast.err'));console.error(err);}
    }else{
      var pasteAns=(document.getElementById('md-paste-ta').value||'').trim();if(!pasteAns){sb.disabled=false;return;}
      entry.comments=entry.comments||[];entry.comments.push({q:(document.getElementById('md-ta').value||G.sel).slice(0,80),a:pasteAns,date:new Date().toISOString().slice(0,10)});
      sv();closeMO();showE(entry.id);toast(t('toast.fu'));
    }
  }else{
    var inp=(document.getElementById('md-ta').value||'').trim();if(!inp){sb.disabled=false;return;}
    entry.comments=entry.comments||[];entry.comments.push({q:'✏️ '+G.sel.slice(0,50)+(G.sel.length>50?'…':''),a:inp,date:new Date().toISOString().slice(0,10)});
    sv();closeMO();showE(entry.id);toast(t('toast.ok'));
  }
  sb.disabled=false;
}

/* ═══ ENTERPRISE BROWSER MODE ENGINE ════════════════════
   Works entirely in the browser — no API key, no server.
   Uses the user's existing Claude Enterprise SSO session.
═══════════════════════════════════════════════════════ */
var ENT = {
  claudeUrl: 'https://claude.ai',
  win: null,
  pending: null,
  pollTimer: null,
  statusTimeout: null
};

/* Read/save enterprise claude URL */
function entGetUrl(){ return localStorage.getItem('ewk5_ent_url')||'https://claude.ai'; }
function entSaveUrl(u){ localStorage.setItem('ewk5_ent_url',u); ENT.claudeUrl=u; }

/* Show/hide enterprise UI in settings */
function entShowUI(show){
  var ui=document.getElementById('ent-ui');
  var keyRow=document.querySelector('.settings-row');
  var keyLabel=document.getElementById('cfg-key-t');
  var keyDesc=document.getElementById('cfg-key-s');
  if(show){
    // Replace key input area with Claude URL input
    ui.style.display='block';
    var keyInput=document.getElementById('key-input');
    keyInput.type='url';
    keyInput.placeholder='https://claude.ai';
    keyInput.value=entGetUrl();
    keyLabel.textContent=t('ent.claude.url.label');
    keyDesc.textContent=t('ent.claude.url.desc');
    document.getElementById('save-key-btn').onclick=function(){
      var u=(document.getElementById('key-input').value||'').trim()||'https://claude.ai';
      entSaveUrl(u);
      entCheckStatus();
      toast(t('toast.keysaved'));
    };
    // Start status check
    ENT.claudeUrl=entGetUrl();
    entCheckStatus();
  } else {
    ui.style.display='none';
    document.getElementById('save-key-btn').onclick=saveKey;
    document.getElementById('key-input').type='password';
    document.getElementById('key-input').placeholder='sk-...';
  }
}

/* Set status indicator */
function entSetStatus(state, msg){
  var el=document.getElementById('ent-status');
  var txt=document.getElementById('ent-status-text');
  var btn=document.getElementById('ent-login-btn');
  if(!el)return;
  el.className='ent-status '+state;
  txt.textContent=msg||t('ent.status.'+state);
  btn.style.display=(state==='needs-login'||state==='error')?'block':'none';
  btn.textContent=t('ent.login.btn');
}

/* Check if Claude is logged in by probing login state via fetch */
async function entCheckStatus(){
  entSetStatus('checking', t('ent.status.checking'));
  try{
    // Try fetching Claude home — if it redirects to login, user is not authenticated
    var res=await fetch(ENT.claudeUrl+'/api/auth/session',{
      method:'GET',credentials:'include',mode:'cors',
      headers:{'Accept':'application/json'}
    });
    if(res.ok){
      var data=await res.json().catch(function(){return null;});
      // If we get a valid session response with user data = logged in
      if(data&&(data.account_id||data.id||data.user)){
        entSetStatus('ready','');
        checkKeyBanner();
        return true;
      }
    }
    // Try alternate check - just ping the page
    var res2=await fetch(ENT.claudeUrl,{method:'HEAD',credentials:'include',mode:'no-cors'});
    // no-cors succeeds even for redirects but status is 0 (opaque)
    // We'll use a more reliable check: open a hidden window
    entSetStatus('needs-login','');
    return false;
  }catch(e){
    // CORS blocked = different origin or network issue
    // Try window.open approach instead
    entSetStatus('needs-login', t('ent.status.needs-login'));
    return false;
  }
}

/* Open Claude login in a new tab */
function entOpenLogin(){
  var win=window.open(ENT.claudeUrl,'_blank');
  if(!win){
    toast(G.lang==='zh'?'请允许弹出窗口':'Please allow popups for this app');
    return;
  }
  ENT.win=win;
  // Poll until the window is on claude.ai and logged in
  var attempts=0;
  var checkLogin=setInterval(function(){
    attempts++;
    try{
      if(win.closed){
        clearInterval(checkLogin);
        entCheckStatus();
        return;
      }
      // Try reading URL — works if same origin
      var url=win.location.href;
      if(url&&url.indexOf('/login')===-1&&url.indexOf('/auth')===-1){
        clearInterval(checkLogin);
        setTimeout(function(){
          entSetStatus('ready','');
          checkKeyBanner();
          toast(G.lang==='zh'?'Claude 登录成功！':'Claude login successful!');
        }, 1500);
      }
    }catch(e){
      // Cross-origin blocked = still on claude.ai but different page = probably logging in
      // Just wait for user to close window
    }
    if(attempts>120){ clearInterval(checkLogin); entCheckStatus(); } // 2 min timeout
  }, 1000);
}

/* Set progress bar */
function entProgress(pct, msg){
  var el=document.getElementById('ent-progress');
  var fill=document.getElementById('ent-progress-fill');
  var txt=document.getElementById('ent-progress-text');
  if(!el)return;
  el.classList.toggle('show', pct>0);
  if(fill)fill.style.width=pct+'%';
  if(txt&&msg)txt.textContent=msg;
}

/* ── MAIN ENTERPRISE QUERY FUNCTION ──────────────────── */
async function entCallClaude(prompt){
  return new Promise(function(resolve, reject){
    var timeout=null;
    var win=null;
    var pollInterval=null;
    var resolved=false;
    var TIMEOUT_MS=90000; // 90 seconds

    function cleanup(){
      if(timeout)clearTimeout(timeout);
      if(pollInterval)clearInterval(pollInterval);
      if(win&&!win.closed){
        try{ win.close(); }catch(e){}
      }
    }

    function done(result){ if(!resolved){resolved=true;cleanup();resolve(result);} }
    function fail(err){ if(!resolved){resolved=true;cleanup();reject(new Error(err));} }

    // Set overall timeout
    timeout=setTimeout(function(){ fail('ENT_TIMEOUT'); }, TIMEOUT_MS);

    // Open claude.ai/new in a background tab
    entProgress(10, t('ent.progress.opening'));
    win=window.open(ENT.claudeUrl+'/new','ecomwiki_claude_bridge');
    if(!win){ fail('ENT_POPUP_BLOCKED'); return; }

    // Wait for page to load, then inject
    var loadAttempts=0;
    var injected=false;
    var lastResponseLength=0;
    var stableCount=0;

    pollInterval=setInterval(function(){
      loadAttempts++;
      try{
        if(win.closed){ fail('ENT_WINDOW_CLOSED'); return; }

        var doc=win.document;
        if(!doc||!doc.body){ return; } // still loading

        var url=win.location.href||'';
        // Check if redirected to login page
        if(url.indexOf('/login')>-1||url.indexOf('/auth')>-1){
          entProgress(0,'');
          fail('ENT_NOT_LOGGED_IN');
          return;
        }

        // ── PHASE 1: Inject the prompt ──
        if(!injected&&loadAttempts>3){
          entProgress(30, t('ent.progress.injecting'));

          // Find the input field — claude.ai uses a contenteditable div
          var input=doc.querySelector('div[contenteditable="true"][data-testid]')
            ||doc.querySelector('div[contenteditable="true"].ProseMirror')
            ||doc.querySelector('div[contenteditable="true"]')
            ||doc.querySelector('textarea[placeholder]');

          if(input){
            injected=true;
            entProgress(50, t('ent.progress.waiting'));

            // Inject text into the input
            if(input.tagName==='TEXTAREA'){
              input.value=prompt;
              input.dispatchEvent(new Event('input',{bubbles:true}));
              input.dispatchEvent(new Event('change',{bubbles:true}));
            } else {
              // contenteditable
              input.focus();
              doc.execCommand('selectAll');
              doc.execCommand('insertText',false,prompt);
              input.dispatchEvent(new InputEvent('input',{bubbles:true,inputType:'insertText',data:prompt}));
            }

            // Submit after short delay (let React/Svelte state update)
            setTimeout(function(){
              if(resolved)return;
              // Find send button
              var btn=doc.querySelector('button[aria-label*="Send"]')
                ||doc.querySelector('button[data-testid*="send"]')
                ||doc.querySelector('button[type="submit"]')
                ||doc.querySelector('button svg[data-icon="send"]')?.closest('button');

              if(btn&&!btn.disabled){
                btn.click();
              } else {
                // Fallback: simulate Enter keypress
                input.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',code:'Enter',bubbles:true,cancelable:true}));
              }
            }, 800);
          }
        }

        // ── PHASE 2: Wait for and extract response ──
        if(injected){
          entProgress(70, t('ent.progress.waiting'));

          // Look for Claude's response — streaming indicator gone = done
          var isStreaming=doc.querySelector('[data-testid="streaming-indicator"]')
            ||doc.querySelector('.animate-pulse')
            ||doc.querySelector('[class*="loading"]');

          // Find response containers
          var responses=doc.querySelectorAll('[data-testid*="message"][class*="assistant"],[data-testid="message"],[class*="assistant-message"]');
          if(!responses||responses.length===0){
            responses=doc.querySelectorAll('.prose,[class*="markdown"],[class*="response"]');
          }

          var lastResponse=responses[responses.length-1];
          var currentText=lastResponse?lastResponse.innerText||lastResponse.textContent||'':'';

          if(currentText.length>50&&!isStreaming){
            stableCount++;
          } else {
            stableCount=0;
          }

          // Stable for 3 checks = done
          if(stableCount>=3){
            entProgress(90, t('ent.progress.extracting'));
            // Extract JSON from the response
            var jsonText='';
            var jsonMatch=currentText.match(/\{[\s\S]*"name"[\s\S]*"concept"[\s\S]*\}/);
            if(jsonMatch){
              jsonText=jsonMatch[0];
            } else {
              // Try finding code blocks
              var codeBlocks=lastResponse?lastResponse.querySelectorAll('code,pre'):[];
              for(var i=0;i<codeBlocks.length;i++){
                var txt=codeBlocks[i].textContent||'';
                if(txt.indexOf('"name"')>-1&&txt.indexOf('"concept"')>-1){
                  jsonText=txt;break;
                }
              }
            }
            if(jsonText){
              entProgress(100,'');
              setTimeout(function(){ entProgress(0,''); },500);
              done(jsonText);
            } else if(stableCount>=6){
              // Extended wait, still no JSON — return full text for parseAndSave to handle
              done(currentText);
            }
          }
        }
      }catch(e){
        // Cross-origin error: window navigated away from claude.ai (e.g., login page)
        if(e.name==='SecurityError'||e.toString().indexOf('cross-origin')>-1){
          if(injected){
            fail('ENT_CROSS_ORIGIN');
          }
          // If not yet injected, still loading — wait
        }
      }
    }, 1000); // poll every 1 second
  });
}

  document.getElementById('l-t').textContent=t('l.t');
  document.getElementById('l-s').textContent=t('ent.progress.opening');

  var loadSteps=[t('ent.progress.opening'),t('ent.progress.injecting'),t('ent.progress.waiting'),t('ent.progress.extracting')];
  var stepIdx=0;
  var stepTimer=setInterval(function(){
    stepIdx=(stepIdx+1)%loadSteps.length;
    document.getElementById('l-s').textContent=loadSteps[stepIdx];
  },4000);

  try{
    var raw=await entCallClaude(prompt);
    clearInterval(stepTimer);
    parseAndSave(raw,false);
  }catch(err){
    clearInterval(stepTimer);
    document.getElementById('ask-load').style.display='none';
    document.getElementById('ask-idle').style.display='flex';
    document.getElementById('ask-btn').disabled=false;
    entProgress(0,'');

    var errMap={
      'ENT_NOT_LOGGED_IN':t('ent.err.not-logged-in'),
      'ENT_TIMEOUT':t('ent.err.timeout'),
      'ENT_POPUP_BLOCKED':(G.lang==='zh'?'请在浏览器中允许弹出窗口，然后重试':'Please allow popups in your browser, then retry'),
      'ENT_WINDOW_CLOSED':(G.lang==='zh'?'Claude 窗口被关闭，请重试':'Claude window was closed — please retry'),
      'ENT_CROSS_ORIGIN':(G.lang==='zh'?'Claude 会话已过期，请重新登录':'Claude session expired — please log in again')
    };
    var msg=errMap[err.message]||(t('toast.err')+': '+err.message.slice(0,80));
    toast(msg);
    // If not logged in, show login prompt
    if(err.message==='ENT_NOT_LOGGED_IN'||err.message==='ENT_CROSS_ORIGIN'){
      entSetStatus('needs-login','');
      goP('settings');
    }
    console.error('[EcomWiki Enterprise]',err);
  }
}

}


/* ── CLIPBOARD IMPORT ─────────────────────────────────────
   Reads clipboard, tries structured text first, then JSON.
   Works whether user copied from AI in Skill mode or manually.
─────────────────────────────────────────────────────────── */
async function importClipboard(){
  var btn = document.getElementById('clip-btn');
  var icon = document.getElementById('clip-btn-icon');
  var txt = document.getElementById('clip-btn-text');

  // Button feedback: loading
  btn.disabled = true;
  icon.textContent = '⏳';
  txt.textContent = G.lang==='zh' ? '正在读取剪贴板...' : 'Reading clipboard...';

  try {
    var raw = await navigator.clipboard.readText();
    if (!raw || !raw.trim()) {
      throw new Error('EMPTY');
    }

    // Try to parse
    var result = parseAndSave(raw.trim(), true);
    if (result) {
      // Success
      btn.classList.add('success');
      icon.textContent = '✅';
      txt.textContent = (G.lang==='zh' ? '词条「' : 'Entry "') + result.name + (G.lang==='zh' ? '」已导入！' : '" imported!');
      setTimeout(function(){
        btn.classList.remove('success');
        btn.disabled = false;
        icon.textContent = '📋';
        txt.textContent = G.lang==='zh' ? '从剪贴板导入 AI 回复' : 'Import from clipboard';
      }, 2500);
    } else {
      throw new Error('PARSE_FAIL');
    }
  } catch(err) {
    btn.classList.add('error');
    icon.textContent = '❌';
    var errMsg;
    if (err.message === 'EMPTY') {
      errMsg = G.lang==='zh' ? '剪贴板为空，请先复制 AI 回复' : 'Clipboard is empty — copy the AI response first';
    } else if (err.name === 'NotAllowedError') {
      errMsg = G.lang==='zh' ? '请允许访问剪贴板权限' : 'Please allow clipboard access';
    } else {
      errMsg = G.lang==='zh' ? '解析失败，请检查内容格式' : 'Parse failed — check response format';
    }
    txt.textContent = errMsg;
    setTimeout(function(){
      btn.classList.remove('error');
      btn.disabled = false;
      icon.textContent = '📋';
      txt.textContent = G.lang==='zh' ? '从剪贴板导入 AI 回复' : 'Import from clipboard';
    }, 3000);
  }
}
